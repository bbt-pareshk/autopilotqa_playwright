name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Install system dependencies for Chromium
      - name: Install Playwright Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgtk-3-0 \
            libxshmfence1 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxfixes3 \
            libxrender1 \
            libxcb1 \
            libxext6 \
            wget \
            fonts-liberation \
            libwoff1

      # 6️⃣ Run Playwright Tests
      - name: Run Playwright Tests
        id: playwright
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          CI: true  # triggers headless mode in playwright.config.ts
        run: |
          echo "Running ${{ inputs.suite }} suite on ${{ inputs.environment }} environment"
          if [ "${{ inputs.suite }}" = "smoke" ]; then
            npx playwright test --grep @smoke
          else
            npx playwright test --grep @regression
          fi

      # 7️⃣ Fail build on critical failures (optional)
      - name: Fail build on critical failures
        if: ${{ always() }}
        run: |
          if [ -f scripts/check-critical.js ]; then
            node scripts/check-critical.js
          else
            echo "No critical check script found, skipping"
          fi

      # 8️⃣ Generate Allure report
      - name: Generate Allure Report
        if: ${{ success() }}
        run: |
          npm install -g allure-commandline
          mkdir -p allure-report
          allure generate allure-results --clean -o allure-report

      # 9️⃣ Upload Allure report artifact
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # 🔟 Deploy Allure Report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: ${{ success() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          user_name: github-actions
          user_email: github-actions@github.com

      # 1️⃣1️⃣ Add workflow summary link to Allure report
      - name: Add Allure Report link to workflow summary
        if: ${{ success() }}
        run: |
          echo "Allure Report: [View Report](https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY}/index.html)" >> $GITHUB_STEP_SUMMARY
