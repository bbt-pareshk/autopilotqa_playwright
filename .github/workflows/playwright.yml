name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Workflow will fail if it hangs too long

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run Playwright Tests
      - name: Run Playwright Tests
        id: playwright
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "Running ${{ inputs.suite }} suite on ${{ inputs.environment }} environment"
          set -e
          if [ "${{ inputs.suite }}" = "smoke" ]; then
            npx playwright test --grep @smoke --reporter=list
          else
            npx playwright test --grep @regression --reporter=list
          fi

      # 6️⃣ Fail build on critical failures (optional)
      - name: Fail build on critical failures
        if: ${{ always() }}
        run: |
          if [ -f scripts/check-critical.js ]; then
            node scripts/check-critical.js
          else
            echo "No critical check script found, skipping"

      # 7️⃣ Generate Allure report (only if tests succeed)
      - name: Generate Allure Report
        if: ${{ success() }}
        run: |
          npm install -g allure-commandline
          mkdir -p allure-report
          allure generate allure-results --clean -o allure-report
          echo "Allure report generated at allure-report/index.html"

      # 8️⃣ Upload Allure report as artifact (always)
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # 9️⃣ Deploy Allure Report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: ${{ success() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          user_name: github-actions
          user_email: github-actions@github.com

      # 🔟 Add workflow summary link to Allure report
      - name: Add Allure Report link to workflow summary
        if: ${{ success() }}
        run: |
          echo "Allure Report: [View Report](https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY}/index.html)" >> $GITHUB_STEP_SUMMARY
